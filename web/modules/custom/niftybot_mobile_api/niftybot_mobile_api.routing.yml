# Public discovery and authentication (no token required).
niftybot_mobile_api.meta:
  path: '/api/mobile/v1/meta'
  defaults:
    _controller: '\Drupal\niftybot_mobile_api\Controller\MobileAuthController::meta'
  requirements:
    _access: 'TRUE'
  methods: [GET]

niftybot_mobile_api.auth_login:
  path: '/api/mobile/v1/auth/login'
  defaults:
    _controller: '\Drupal\niftybot_mobile_api\Controller\MobileAuthController::login'
  requirements:
    _access: 'TRUE'
    _user_is_logged_in: 'FALSE'
  methods: [POST]

niftybot_mobile_api.auth_refresh:
  path: '/api/mobile/v1/auth/refresh'
  defaults:
    _controller: '\Drupal\niftybot_mobile_api\Controller\MobileAuthController::refresh'
  requirements:
    _permission: 'use niftybot mobile api'
  options:
    _auth: ['jwt_auth', 'oauth2']
  methods: [POST]

niftybot_mobile_api.auth_oauth_token:
  path: '/api/mobile/v1/auth/oauth/token'
  defaults:
    _controller: '\Drupal\niftybot_mobile_api\Controller\MobileAuthController::oauthToken'
  requirements:
    _access: 'TRUE'
  methods: [POST]

niftybot_mobile_api.me:
  path: '/api/mobile/v1/me'
  defaults:
    _controller: '\Drupal\niftybot_mobile_api\Controller\MobileAuthController::me'
  requirements:
    _permission: 'use niftybot mobile api'
  options:
    _auth: ['jwt_auth', 'oauth2', 'cookie']
  methods: [GET]

niftybot_mobile_api.dashboard:

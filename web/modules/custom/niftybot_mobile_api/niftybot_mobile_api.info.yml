name: 'NiftyBot Mobile API'
type: module
description: 'REST API for Flutter/mobile apps with JWT and OAuth2 authentication.'
package: NiftyBot
core_version_requirement: ^11
dependencies:
  - drupal:user
  - drupal:serialization
  - key:key
  - jwt:jwt
  - jwt_auth_consumer:jwt_auth_consumer
  - jwt_auth_issuer:jwt_auth_issuer
  - consumers:consumers
  - simple_oauth:simple_oauth
  - niftybot_core:niftybot_core
  - niftybot_user:niftybot_user
  - niftybot_subscription:niftybot_subscription
  - niftybot_dashboard:niftybot_dashboard
  - niftybot_investment:niftybot_investment

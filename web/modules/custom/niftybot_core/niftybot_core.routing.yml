niftybot_core.landing:
  path: '/home'
  defaults:
    _controller: '\Drupal\niftybot_core\Controller\LandingController::content'
    _title: 'GrassRed — Automated Algo Trading Portal'
  requirements:
    _access: 'TRUE'

niftybot_core.public_features:
  path: '/features'
  defaults:
    _controller: '\Drupal\niftybot_core\Controller\PublicMarketingController::features'
    _title: 'Algo Trading Features'
  requirements:
    _access: 'TRUE'

niftybot_core.public_pricing:
  path: '/pricing'
  defaults:
    _controller: '\Drupal\niftybot_core\Controller\PublicMarketingController::pricing'
    _title: 'Pricing & Plans'
  requirements:
    _access: 'TRUE'

niftybot_core.public_about:
  path: '/about'
  defaults:
    _controller: '\Drupal\niftybot_core\Controller\PublicMarketingController::about'
    _title: 'About GrassRed'
  requirements:
    _access: 'TRUE'

niftybot_core.public_faq:
  path: '/faq'
  defaults:
    _controller: '\Drupal\niftybot_core\Controller\PublicMarketingController::faq'
    _title: 'FAQ'
  requirements:
    _access: 'TRUE'

niftybot_core.sitemap:

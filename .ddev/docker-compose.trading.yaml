services:
  trading:
    container_name: ddev-${DDEV_SITENAME}-trading
    build:
      context: ../trading_service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../trading_service/.env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=db
      - DB_PASSWORD=db
      - DB_NAME=db
      - LOG_LEVEL=INFO
      - DEBUG=true
    depends_on:
      - db
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
    networks:
      - default
